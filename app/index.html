<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kohortconnect — Study Abroad Consultants Marketplace for Indian Students</title>
    <meta name="description" content="Kohortconnect connects Indian students with verified study abroad consultants. Get free guidance for USA, UK, Canada, Australia, Germany & 14 destinations. AI-powered matching, 100+ consultants, education loans." />
    <meta name="keywords" content="study abroad consultants, education consultants India, overseas education, study in USA, study in Canada, study in UK, study in Australia, study in Germany, education loan, IELTS coaching, student visa" />
    <meta name="author" content="Kohortconnect" />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta property="og:title" content="Kohortconnect — Study Abroad Consultants Marketplace" />
    <meta property="og:description" content="Connect with verified study abroad consultants. Free guidance for 14+ destinations." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kohortconnect" />
    <meta property="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://mthz5iw2vxir4.kimi.page/" />
  </head>
  <body>
    <div id="root"></div>
    <div id="error-log" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#0f172a;color:#f87171;padding:20px;font-family:monospace;font-size:12px;overflow:auto;white-space:pre-wrap;"></div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('error-log');
        if (el) { el.style.display = 'block'; el.textContent += 'ERROR: ' + e.message + '\n at ' + (e.filename || '') + ':' + (e.lineno || '') + '\n\n'; }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('error-log');
        if (el) { el.style.display = 'block'; el.textContent += 'UNHANDLED REJECTION: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '\n\n'; }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Force cache-bust all JS chunks on every load
      (function() {
        var scripts = document.querySelectorAll('script[src*="/assets/"]');
        var t = new Date().getTime();
        scripts.forEach(function(s) {
          if (s.src.indexOf('?') === -1) s.src += '?_=' + t;
        });
      })();
    </script>
  </body>
</html>
